<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* FUNDO ANIMADO */
body {
    font-family: Arial, Helvetica, sans-serif;
    height: 100vh;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #00c9ff);
    background-size: 400% 400%;
    animation: fundoAnimado 10s ease infinite;
    color: white;
}

/* ANIMAÇÃO */
@keyframes fundoAnimado {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* MENU NO TOPO */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

/* LISTA LADO A LADO */
nav ul {
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 30px;
}

/* BOTÕES */
nav ul li a {
    display: block;
    text-decoration: none;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    padding: 12px 25px;
    border-radius: 50px;
    color: white;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

/* EFEITO BRILHO */
nav ul li a::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    transition: 0.5s;
}

nav ul li a:hover::before {
    left: 100%;
}

/* HOVER */
nav ul li a:hover {
    transform: scale(1.1);
    background: linear-gradient(45deg, #00c9ff, #92fe9d);
}

/* CONTEÚDO CENTRAL */
main {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
    margin-top: 80px;
}

/* TÍTULO */
main h1 {
    font-size: 50px;
    margin-bottom: 20px;
    color: #feca57;
    text-shadow: 2px 2px 10px black;
}

/* TEXTO */
main p {
    font-size: 20px;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    nav ul {
        flex-direction: column;
        align-items: center;
    }
}
    </style>


</head>
<body>

    <nav>
        <ul>
            <li><a href="projeto_HTML/html/secretaria.html">Secretaria Virtual</a></li>
            <li><a href="projeto_HTML/html/natal.html">Natal</a></li>
            <li><a href="projeto_HTML/html/inovatech.html">Inova Tech</a></li>
        </ul>
    </nav>

    <main>
        <h1>Bem-vindo ao Projeto</h1>
        <p>Escolha uma das opções ao lado para navegar pelas páginas.</p>
    </main>

   </body>
</html>
